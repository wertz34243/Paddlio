<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <title>Paddlio Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: calc(24px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 20% 0%, rgba(0, 180, 216, 0.22), transparent 26rem),
          linear-gradient(180deg, #0f172a 0%, #0b1120 100%);
      }

      main {
        width: min(100%, 420px);
        display: grid;
        gap: 14px;
        padding: 22px;
        border: 1px solid rgba(144, 224, 239, 0.16);
        border-radius: 20px;
        background: rgba(30, 41, 59, 0.9);
        box-shadow: 0 22px 70px rgba(2, 8, 23, 0.38);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        color: #90e0ef;
        font-size: 28px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Paddlio</h1>
      <p>Du bist gerade offline. Bereits geladene App-Daten bleiben lokal auf deinem Geraet verfuegbar.</p>
      <p>Verbinde dich wieder mit dem Internet und oeffne Paddlio erneut, um Updates zu laden.</p>
    </main>
  </body>
</html>
